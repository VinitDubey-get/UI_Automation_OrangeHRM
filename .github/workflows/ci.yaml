name: CI — Build & Push

on:
  push:
    branches:
      - main
      - ci_cd_setup

  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: vinitdubey-get/ui_automation_orangehrm

jobs:

  # ─────────────────────────────────────────────────────────────
  # BUILD & PUSH DOCKER IMAGE
  # ─────────────────────────────────────────────────────────────
  build-and-push:

    name: Build & Push to GHCR
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:

      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Log in to GHCR
        uses: docker/login-action@v3.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────
  # TRIGGER JENKINS PIPELINE
  # ─────────────────────────────────────────────────────────────
  notify-jenkins:

    name: Trigger Jenkins
    runs-on: ubuntu-latest

    needs: build-and-push

    if: >
      (github.ref == 'refs/heads/main' ||
       github.ref == 'refs/heads/ci_cd_setup') &&
      github.event_name == 'push'

    steps:

      - name: Trigger Jenkins Pipeline
        env:
          JENKINS_URL: ${{ secrets.JENKINS_WEBHOOK_URL_BASE }}
          JENKINS_USER: ${{ secrets.JENKINS_USER }}
          JENKINS_TOKEN: ${{ secrets.JENKINS_TOKEN }}
          JOB_NAME: UI_Automation
          REMOTE_TOKEN: ui-automation-trigger
        run: |
          # ── Step 1: fetch a fresh CSRF crumb ──────────────────────────
          CRUMB=$(curl -s --fail \
            --user "$JENKINS_USER:$JENKINS_TOKEN" \
            "$JENKINS_URL/crumbIssuer/api/json" \
            | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          print(d['crumbRequestField'] + ':' + d['crumb'])
          ")

          echo "Crumb field: ${CRUMB%%:*}=<hidden>"

          # ── Step 2: trigger the build ──────────────────────────────────
          curl -X POST \
            --user "$JENKINS_USER:$JENKINS_TOKEN" \
            -H "$CRUMB" \
            --fail \
            --silent \
            --show-error \
            "$JENKINS_URL/job/$JOB_NAME/build?token=$REMOTE_TOKEN"

          echo "✓ Jenkins build queued successfully"