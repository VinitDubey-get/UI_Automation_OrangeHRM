name: CI — Build, Test & Push

on:
  push:
    branches: [main, ci_cd_setup]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: vinitdubey-get/ui_automation_orangehrm

jobs:
  build-and-test:
    name: Build → Smoke → Regression
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Log in to GHCR
        uses: docker/login-action@v3.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Single build — push only on non-PR ──────────────────────────────────
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Create allure results directory with open permissions ────────────────
      - name: Create allure-results directory
        run: |
          mkdir -p ${{ github.workspace }}/allure-results
          chmod 777 ${{ github.workspace }}/allure-results

      # ── Smoke ────────────────────────────────────────────────────────────────
      - name: Run smoke tests
        run: |
          docker run --rm \
            --shm-size=2gb \
            -e BASE_URL=https://practice.expandtesting.com \
            -e HEADLESS=true \
            -v ${{ github.workspace }}/allure-results:/app/allure-results \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            tests/ -m smoke --alluredir=allure-results -v --tb=short

      # ── Regression ───────────────────────────────────────────────────────────
      - name: Run regression tests
        run: |
          docker run --rm \
            --shm-size=2gb \
            -e BASE_URL=https://practice.expandtesting.com \
            -e HEADLESS=true \
            -v ${{ github.workspace }}/allure-results:/app/allure-results \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            tests/ -m regression --alluredir=allure-results -v --tb=short

      # ── Allure results artifact ───────────────────────────────────────────────
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: allure-results-${{ github.sha }}
          path: allure-results/
          retention-days: 7

  # ── Notify Jenkins ────────────────────────────────────────────────────────
  notify-jenkins:
    name: Trigger Jenkins
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Jenkins webhook
        run: |
          curl -X POST "${{ secrets.JENKINS_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -u "${{ secrets.JENKINS_USER }}:${{ secrets.JENKINS_TOKEN }}" \
            --fail --silent