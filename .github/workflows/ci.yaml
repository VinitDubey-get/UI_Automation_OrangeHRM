name: CI — Build & Push

on:
  push:
    branches:
      - main
      - ci_cd_setup

  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: vinitdubey-get/ui_automation_orangehrm

jobs:

  # ─────────────────────────────────────────────────────────────
  # CODE QUALITY GATES
  # ─────────────────────────────────────────────────────────────
  code-quality:
    name: Code Quality Gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Install quality tools
        run: pip install -r requirements-dev.txt

      - name: black
        run: black --check --line-length=100 .

      - name: isort
        run: isort --check-only --profile=black --line-length=100 .

      - name: flake8
        run: flake8 .

      - name: bandit
        run: bandit -ll -r . --exclude .venv,tests/

      - name: pip-audit
        run: pip-audit -r requirements.txt

  # ─────────────────────────────────────────────────────────────
  # BUILD & PUSH DOCKER IMAGE
  # ─────────────────────────────────────────────────────────────
  build-and-push:

    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    needs: code-quality

    permissions:
      contents: read
      packages: write

    steps:

      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Log in to GHCR
        uses: docker/login-action@v3.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────
  # TRIGGER JENKINS PIPELINE
  # ─────────────────────────────────────────────────────────────
  notify-jenkins:

    name: Trigger Jenkins
    runs-on: ubuntu-latest

    needs: build-and-push

    if: >
      (github.ref == 'refs/heads/main' ||
       github.ref == 'refs/heads/ci_cd_setup') &&
      github.event_name == 'push'

    steps:

      - name: Trigger Jenkins Pipeline
        env:
          JENKINS_URL: ${{ secrets.JENKINS_WEBHOOK_URL_BASE }}
          JENKINS_USER: ${{ secrets.JENKINS_USER }}
          JENKINS_TOKEN: ${{ secrets.JENKINS_TOKEN }}
          JOB_NAME: UI_Automation
          REMOTE_TOKEN: ui-automation-trigger
        run: |
          # Strip any accidental trailing slash from the base URL
          JENKINS_URL="${JENKINS_URL%/}"

          echo "── Step 1: verify Jenkins is reachable ───────────────────"
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --user "$JENKINS_USER:$JENKINS_TOKEN" \
            "$JENKINS_URL/api/json")
          echo "Jenkins /api/json status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "ERROR: Cannot reach Jenkins. Got HTTP $HTTP_STATUS"
            echo "Check: JENKINS_WEBHOOK_URL_BASE, JENKINS_USER, JENKINS_TOKEN secrets"
            exit 1
          fi

          echo "── Step 2: fetch CSRF crumb ──────────────────────────────"
          CRUMB_RESPONSE=$(curl -s \
            -w "\n%{http_code}" \
            --user "$JENKINS_USER:$JENKINS_TOKEN" \
            "$JENKINS_URL/crumbIssuer/api/json")

          CRUMB_BODY=$(echo "$CRUMB_RESPONSE" | head -n -1)
          CRUMB_STATUS=$(echo "$CRUMB_RESPONSE" | tail -n 1)
          echo "Crumb endpoint status: $CRUMB_STATUS"

          if [ "$CRUMB_STATUS" = "404" ]; then
            echo "CSRF protection is disabled; skipping crumb header"
            CRUMB_HEADER=""
          elif [ "$CRUMB_STATUS" != "200" ]; then
            echo "ERROR: Crumb endpoint returned HTTP $CRUMB_STATUS"
            echo "Response body: $CRUMB_BODY"
            exit 1
          else
            CRUMB_HEADER=$(echo "$CRUMB_BODY" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          print(d['crumbRequestField'] + ':' + d['crumb'])
          ")
            echo "Crumb field: ${CRUMB_HEADER%%:*}=<hidden>"
          fi

          echo "── Step 3: trigger the build ─────────────────────────────"
          # NOTE: buildWithParameters works for both parameterised and
          # plain jobs — /build returns 400 on some Jenkins configurations
          CURL_ARGS=(
            -X POST
            --user "$JENKINS_USER:$JENKINS_TOKEN"
            --fail
            --show-error
            "$JENKINS_URL/job/$JOB_NAME/buildWithParameters?token=$REMOTE_TOKEN"
          )
          if [ -n "$CRUMB_HEADER" ]; then
            CURL_ARGS+=(-H "$CRUMB_HEADER")
          fi

          HTTP_BUILD=$(curl -s -o /dev/null -w "%{http_code}" "${CURL_ARGS[@]}")
          echo "Build trigger response: $HTTP_BUILD"

          # Jenkins returns 201 Created when build is successfully queued
          if [ "$HTTP_BUILD" = "201" ] || [ "$HTTP_BUILD" = "200" ]; then
            echo "✓ Jenkins build queued successfully"
          else
            echo "ERROR: Build trigger returned HTTP $HTTP_BUILD"
            exit 1
          fi