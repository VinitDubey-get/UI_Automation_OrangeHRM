name: CI — Build & Push

on:
  push:
    branches:
      - main
      - ci_cd_setup

  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: vinitdubey-get/ui_automation_orangehrm

jobs:

  # ─────────────────────────────────────────────────────────────
  # BUILD & PUSH DOCKER IMAGE
  # ─────────────────────────────────────────────────────────────
  build-and-push:

    name: Build & Push to GHCR
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:

      # Checkout repository
      - name: Checkout
        uses: actions/checkout@v4.2.2

      # Setup Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      # Login to GitHub Container Registry
      - name: Log in to GHCR
        uses: docker/login-action@v3.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build & Push Docker Image
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .

          # Push only on non-PR events
          push: ${{ github.event_name != 'pull_request' }}

          # Load image locally for PR validation
          load: ${{ github.event_name == 'pull_request' }}

          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────
  # TRIGGER JENKINS PIPELINE
  # ─────────────────────────────────────────────────────────────
  notify-jenkins:

    name: Trigger Jenkins
    runs-on: ubuntu-latest

    needs: build-and-push

    # Trigger only on push to main or ci_cd_setup
    if: >
      (github.ref == 'refs/heads/main' ||
       github.ref == 'refs/heads/ci_cd_setup') &&
      github.event_name == 'push'

    steps:

      - name: Debug Jenkins URL
        run: |
          echo "${{ secrets.JENKINS_WEBHOOK_URL }}" | sed 's/token=.*/token=***/'

      - name: Trigger Jenkins Pipeline
        run: |
          curl -X POST "${{ secrets.JENKINS_WEBHOOK_URL }}" \
            --fail \
            --silent \
            --show-error